services:
  # Backend services
  nginx:
    image: nginx:alpine
    ports:
      - ${NGINX_PORT}:80
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/conf.d/$NGINX_CONFIG:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - vpn-network
    restart: always

  php:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/html
    user: "33:33"
    depends_on:
      - postgres
      - rabbitmq
      - redis
    networks:
      - vpn-network
    restart: always

  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/html
    user: "33:33"
    depends_on:
      - postgres
      - rabbitmq
      - redis
    networks:
      - vpn-network
    command: php artisan horizon
    restart: always

  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - ${POSTGRES_PORT}:5432
    networks:
      - vpn-network
    restart: always

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - ${RABBITMQ_PORT}:5672
      - ${RABBITMQ_MANAGEMENT_PORT}:15672
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    networks:
      - vpn-network
    restart: always

  redis:
    image: redis:7.4.2
    restart: always
    command:
      - 'redis-server'
      - '--save 60 100'
      - '--loglevel warning'
      - '--maxmemory-policy allkeys-lru'
      - '--maxmemory 256mb'

    volumes:
      - ./backend/.storage/redis:/data
    ports:
      - ${REDIS_PORT}:6379
    networks:
      - vpn-network

  # Frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - ${FRONTED_PORT}:80
    restart: always
    volumes:
      - ./frontend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - vpn-network

  frontend-miniapp:
    build:
      context: ./frontend-miniapp
      dockerfile: Dockerfile
    restart: always
    ports:
      - ${FRONTEND_MINIAPP_PORT}:80
    depends_on:
      - php
    networks:
      - vpn-network

  frontend-web:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    restart: always
    ports:
      - ${FRONTEND_WEB_PORT}:80
    depends_on:
      - php
    networks:
      - vpn-network

  # Ngrok service for Telegram webhook
  ngrok:
    image: ngrok/ngrok:latest
    platform: linux/amd64
    command: http nginx:80
    env_file:
      - .env
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTH_TOKEN}
    ports:
      - "4040:4040"
    networks:
      - vpn-network
    profiles:
      - dev

networks:
  vpn-network:
    driver: bridge

volumes:
  postgres_data: 